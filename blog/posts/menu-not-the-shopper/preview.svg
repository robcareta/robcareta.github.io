<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two dinners illustration: a ribeye steak with potatoes on one plate, a bowl of lentil stew with carrots on the other.">
  <!-- Background: warm cream -->
  <rect width="1200" height="630" fill="#f4ede2"/>

  <!-- Soft texture lines in background -->
  <g stroke="#e2d8c5" stroke-width="1" opacity="0.5">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
  </g>

  <!-- LEFT PLATE: ribeye + potatoes -->
  <g transform="translate(340 315)">
    <!-- Plate rim -->
    <circle cx="0" cy="0" r="200" fill="#ffffff" stroke="#005f73" stroke-width="6"/>
    <circle cx="0" cy="0" r="172" fill="none" stroke="#005f73" stroke-width="1" opacity="0.35"/>
    <!-- Steak: irregular blob -->
    <path d="M -110 -35 C -130 -5, -115 40, -80 55 C -40 75, 40 70, 80 55 C 120 40, 125 -5, 105 -35 C 85 -65, 30 -75, -10 -72 C -55 -68, -95 -60, -110 -35 Z"
          fill="#6b3823" opacity="0.92"/>
    <!-- Steak grill marks -->
    <path d="M -60 -20 L -40 10 M -20 -30 L 0 5 M 20 -28 L 40 8 M 55 -22 L 72 12" stroke="#2a1208" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <!-- Two roasted potatoes -->
    <ellipse cx="-115" cy="75" rx="34" ry="24" fill="#d4a85a"/>
    <ellipse cx="-108" cy="68" rx="20" ry="10" fill="#e8c27a" opacity="0.6"/>
    <ellipse cx="115" cy="78" rx="32" ry="23" fill="#d4a85a"/>
    <ellipse cx="110" cy="72" rx="18" ry="9" fill="#e8c27a" opacity="0.6"/>
  </g>

  <!-- DIVIDER between plates -->
  <g opacity="0.35">
    <line x1="600" y1="195" x2="600" y2="435" stroke="#8a8070" stroke-width="1" stroke-dasharray="3,8"/>
  </g>

  <!-- RIGHT PLATE: lentil stew -->
  <g transform="translate(860 315)">
    <!-- Plate rim -->
    <circle cx="0" cy="0" r="200" fill="#ffffff" stroke="#606c38" stroke-width="6"/>
    <circle cx="0" cy="0" r="172" fill="none" stroke="#606c38" stroke-width="1" opacity="0.35"/>
    <!-- Bowl of stew -->
    <circle cx="0" cy="0" r="130" fill="#a47849"/>
    <circle cx="0" cy="0" r="130" fill="url(#stewGradient)"/>
    <!-- Lentil dots -->
    <g fill="#6b3f1c">
      <circle cx="-60" cy="-35" r="5"/>
      <circle cx="-35" cy="-20" r="6"/>
      <circle cx="-10" cy="-40" r="5"/>
      <circle cx="15" cy="-25" r="6"/>
      <circle cx="42" cy="-38" r="5"/>
      <circle cx="68" cy="-18" r="5"/>
      <circle cx="-70" cy="10" r="5"/>
      <circle cx="-45" cy="20" r="6"/>
      <circle cx="-18" cy="5" r="5"/>
      <circle cx="8" cy="22" r="5"/>
      <circle cx="35" cy="8" r="6"/>
      <circle cx="60" cy="25" r="5"/>
      <circle cx="-50" cy="48" r="5"/>
      <circle cx="-15" cy="55" r="6"/>
      <circle cx="20" cy="50" r="5"/>
      <circle cx="50" cy="58" r="5"/>
    </g>
    <!-- Carrot chunks -->
    <g fill="#e07a37">
      <path d="M -78 -8 q 12 -6 22 0 q -12 6 -22 0 Z"/>
      <path d="M 55 -55 q 14 -5 24 2 q -14 5 -24 -2 Z"/>
      <path d="M -12 70 q 13 -4 22 2 q -13 4 -22 -2 Z"/>
      <path d="M 72 42 q 12 -5 20 1 q -12 5 -20 -1 Z"/>
    </g>
    <!-- Parsley garnish -->
    <g fill="#4a5c20">
      <circle cx="-20" cy="-60" r="3"/>
      <circle cx="-12" cy="-64" r="3"/>
      <circle cx="-4" cy="-60" r="3"/>
      <circle cx="30" cy="-58" r="3"/>
      <circle cx="38" cy="-62" r="3"/>
    </g>
  </g>

  <defs>
    <radialGradient id="stewGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b88a52" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a502a" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- Subtle italic caption at bottom -->
  <text x="600" y="575" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30"
        fill="#3a3a3a"
        font-style="italic"
        letter-spacing="1">Two dinners.</text>
</svg>
